site_name: ValorAI
site_description: >-
  A modern framework and use case library for measuring the true financial
  value of AI — rigorous assessment methodologies, ROI modelling, value
  realisation, and decision frameworks.
site_url: https://felipelago17.github.io/valorai/
repo_url: https://github.com/felipelago17/valorai
repo_name: felipelago17/valorai

copyright: >-
  <strong>Disclaimer:</strong> This site is an academic discussion based on publicly available data and literature.
  It does not constitute legal, financial, or investment advice.
  All findings are sourced from third-party research; citations marked [VERIFY] require independent confirmation.
  © Felipe Lago

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js
  - javascripts/charts.js

nav:
  - Home: index.md
  - Methodology:
      - Measurement Discipline: methodology/measurement-discipline.md
      - Valuation Models: methodology/valuation-models.md
  - Indirect Costs:
      - Overview: indirect-costs/index.md
      - Sector Lenses: sector-lenses.md
      - Technical & Operational Debt: indirect-costs/technical-debt.md
      - Integration & Implementation: indirect-costs/integration-implementation.md
      - Verification & Oversight: indirect-costs/verification-oversight.md
      - Cognitive & Human Capital: indirect-costs/cognitive-human-capital.md
      - Environmental Externalities: indirect-costs/environmental-externalities.md
      - Labour & Supply Chain: indirect-costs/labour-supply-chain.md
      - Governance & Shadow AI: indirect-costs/governance-shadow-ai.md
  - Evidence:
      - Base Rates: evidence/base-rates.md
      - "Energy: Pilot-to-Production Gap": evidence/energy-pilot-gap.md
      - Bibliography: evidence/bibliography.md
  - Literature:
      - Source Library: literature/index.md
      - Bibliography: literature/bibliography.md
  - Use Cases:
      - Overview: use-cases/index.md
      - "Energy: Predictive Maintenance (JV)": use-cases/energy-predictive-maintenance.md
      - Use-Case Template: use-cases/_template.md
  - How to Cite: cite.md
  - Related Projects: related-projects.md
